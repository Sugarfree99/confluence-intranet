<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confluence Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="chat-header" id="chatHeader">
      <div class="wrapper header-wrapper">
        <img class="logo" src="/Nordrest.png" alt="Nordrest" />
        <button class="menu-btn" type="button" aria-label="Open menu">
          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="menu-label">MENY</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <section class="hero-unit home-hero" aria-hidden="true"></section>

      <div class="content-block">
        <div id="workspace" class="workspace">
          <aside id="previewPane" class="preview-pane" aria-label="Sidvisning">
            <button id="previewClose" class="preview-close" type="button" aria-label="Stäng sida">×</button>
            <div id="previewFrame" class="preview-frame" aria-label="Sidinnehåll"></div>
          </aside>
          <div id="resizer" class="resizer" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Ändra storlek på paneler"></div>
          <main class="chat-pane">
            <div class="chat-pane-header" aria-label="Chatrubrik">Nordrest Chat</div>
            <section id="chatLog" class="chat-log" aria-live="polite">
              <article class="bubble bot">
                Ställ en fråga om företagets interna dokument. Jag söker igenom relevanta medarbetardokument med RAG och ger dig ett kort, tydligt svar.
              </article>
            </section>

            <footer class="composer">
              <form id="chatForm" class="composer-form">
                <input
                  id="questionInput"
                  class="composer-input"
                  type="text"
                  placeholder="Ställ en fråga om företagets dokument..."
                  autocomplete="off"
                  required
                />
                <button id="sendBtn" class="send-btn" type="submit">Skicka</button>
              </form>
            </footer>
          </main>
        </div>
      </div>
    </div>

    <footer class="site-footer" aria-label="Site footer">
      <div class="footer-inner">
        <div class="footer-block">
          <div class="footer-content">
            <div class="footer-logo-wrap">
              <img class="footer-logo" src="/Nordrest.png" alt="Nordrest" />
            </div>
            <p class="footer-text">Copyright © Nordrest 2026</p>
            <div class="logout-form">
              <p>Du är inloggad som Nordrestanställd</p>
              <form action="/sv/" enctype="multipart/form-data" method="post">
                <button class="logout-btn" type="submit">Logga ut</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      const chatLog = document.getElementById("chatLog");
      const chatForm = document.getElementById("chatForm");
      const questionInput = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatHeader = document.getElementById("chatHeader");
      const workspace = document.getElementById("workspace");
      const previewPane = document.getElementById("previewPane");
      const previewFrame = document.getElementById("previewFrame");
      const previewClose = document.getElementById("previewClose");
      const resizer = document.getElementById("resizer");

      // Render a Confluence page directly inside the host document. We fetch
      // the page as a JSON fragment (`?fragment=1`) and inject the HTML into
      // a div so it lives in the same DOM as the chat — no iframe.
      // Highlight the chunk that RAG matched. The excerpt that comes back
      // from the server is the first ~200 chars of the chunk text, which is
      // extracted from the page body and may include punctuation/whitespace
      // (table pipes, newlines) that don't appear verbatim in the rendered
      // HTML. So we tokenize both sides into words and search for the
      // longest contiguous run of excerpt-words inside the page.
      function tokenize(text) {
        // Keep letters (incl. Nordic), digits and `@` so e.g. e-mail
        // addresses survive as recognizable tokens. Everything else becomes
        // a separator. We return both the lowercased token and its
        // position in the original text for later range-mapping.
        const re = /[\p{L}\p{N}@.+\-_]+/gu;
        const out = [];
        let m;
        while ((m = re.exec(text)) !== null) {
          out.push({ word: m[0].toLowerCase(), start: m.index, end: m.index + m[0].length });
        }
        return out;
      }

      // Try to find a page header (h1-h6) that matches the excerpt tokens.
      // Headers are stable section markers, so we prefer matching them over
      // matching content. Returns the header element or null.
      function matchHeaderToExcerpt(container, excerptTokens) {
        if (excerptTokens.length === 0) return null;
        const headers = Array.from(container.querySelectorAll("h1, h2, h3, h4, h5, h6"));
        let bestHeader = null;
        let bestScore = 0;

        for (const header of headers) {
          const headerTokens = tokenize(header.textContent || "").map((t) => t.word);
          if (headerTokens.length === 0) continue;

          const excerptSet = new Set(excerptTokens);
          let matchCount = 0;

          if (headerTokens.length <= 5) {
            for (const w of headerTokens) {
              if (excerptSet.has(w)) matchCount++;
            }
            const threshold = Math.ceil(headerTokens.length * 0.6);
            if (matchCount >= threshold && matchCount > bestScore) {
              bestScore = matchCount;
              bestHeader = header;
            }
          } else {
            const headerSet = new Set(headerTokens);
            for (const w of excerptTokens) {
              if (headerSet.has(w)) matchCount++;
            }
            const threshold = Math.max(3, excerptTokens.length * 0.5);
            if (matchCount >= threshold && matchCount > bestScore) {
              bestScore = matchCount;
              bestHeader = header;
            }
          }
        }
        return bestHeader;
      }

      // Resolve a scroll target for the matched excerpts. We only use
      // header matching now — no inline mark wrapping — because content
      // highlighting was unreliable across tables and rich layouts.
      function highlightExcerpts(container, excerpts) {
        if (!container || !Array.isArray(excerpts) || excerpts.length === 0) return null;
        for (const raw of excerpts) {
          if (typeof raw !== "string" || !raw.trim()) continue;
          const excerptTokens = tokenize(
            raw.replace(/\u2026|\.{3,}/g, " ")
          ).map((t) => t.word);
          if (excerptTokens.length === 0) continue;
          const header = matchHeaderToExcerpt(container, excerptTokens);
          if (header) {
            header.classList.add("rag-hit-target");
            return header;
          }
        }
        return null;
      }

      let previewToken = 0;

      // After we render, images load and the page reflows. Re-scroll to
      // the matched region a few times: immediately, after a short
      // timeout, and once all images have finished loading. We bail if
      // the user has opened a different page in the meantime (token).
      function scheduleStableScroll(container, hitOrNull, token) {
        function findTarget() {
          if (hitOrNull && hitOrNull.isConnected) return hitOrNull;
          return container.querySelector(".rag-hit-target");
        }

        // Use 'auto' (instant) for the first pass so the page lands at
        // the right region immediately rather than animating from the
        // top — smooth scroll for later passes is fine since the user
        // would see them as gentle corrections.
        const doScroll = (behavior) => {
          if (token !== previewToken) return;
          const target = findTarget();
          if (!target) return;
          try {
            target.scrollIntoView({ behavior: behavior || "auto", block: "center" });
          } catch (_e) {
            target.scrollIntoView();
          }
        };

        requestAnimationFrame(() => doScroll("auto"));
        setTimeout(() => doScroll("auto"), 250);

        const imgs = Array.from(container.querySelectorAll("img"));
        const pending = imgs.filter((img) => !img.complete);
        if (pending.length === 0) return;
        let remaining = pending.length;
        const onDone = () => {
          remaining -= 1;
          if (remaining <= 0) {
            requestAnimationFrame(() => doScroll("smooth"));
          }
        };
        for (const img of pending) {
          img.addEventListener("load", onDone, { once: true });
          img.addEventListener("error", onDone, { once: true });
        }
        setTimeout(() => {
          if (remaining > 0) {
            remaining = 0;
            requestAnimationFrame(() => doScroll("smooth"));
          }
        }, 2000);
      }
      async function openPreview(url, title, excerpts) {
        if (!url) return;
        workspace.classList.add("split");
        previewFrame.scrollTop = 0;
        previewFrame.innerHTML = '<p class="doc-loading">Laddar sida…</p>';
        const myToken = ++previewToken;
        const fragmentUrl = /^\/doc\//.test(url)
          ? url + (url.includes("?") ? "&" : "?") + "fragment=1"
          : null;

        if (!fragmentUrl) {
          previewFrame.innerHTML =
            '<p class="doc-error">Den h\u00e4r sidan kan inte visas h\u00e4r. <a href="' +
            url +
            '" target="_blank" rel="noopener noreferrer">\u00d6ppna i ny flik</a>.</p>';
          return;
        }

        try {
          const response = await fetch(fragmentUrl, {
            headers: { Accept: "application/json" },
          });
          if (myToken !== previewToken) return;
          if (!response.ok) throw new Error("HTTP " + response.status);
          const payload = await response.json();
          if (myToken !== previewToken) return;
          // Inject title as an h1 so the page reads as a real page now that
          // the chrome header is gone. Add right padding so the heading
          // doesn't run under the floating close button.
          const safeTitle = escapeHtml(payload.title || title || "");
          previewFrame.innerHTML =
            (safeTitle
              ? '<h1 class="doc-title" style="padding-right:44px">' + safeTitle + "</h1>"
              : "") + (payload.bodyHtml || "");
          previewFrame.querySelectorAll("a[href]").forEach((a) => {
            const href = a.getAttribute("href") || "";
            if (/^https?:/i.test(href)) {
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener noreferrer");
            }
          });
          const hit = highlightExcerpts(previewFrame, excerpts);

          // Images and lazy resources reflow the page after the initial
          // scrollIntoView, which means the target slides off-screen. Wait
          // for any in-flight images to settle, then re-scroll so the
          // matched region is actually in view when the user looks.
          scheduleStableScroll(previewFrame, hit, myToken);
        } catch (err) {
          if (myToken !== previewToken) return;
          previewFrame.innerHTML =
            '<p class="doc-error">Kunde inte ladda sidan. <a href="' +
            url +
            '" target="_blank" rel="noopener noreferrer">\u00d6ppna i ny flik</a>.</p>';
        }
      }

      function closePreview() {
        previewToken++;
        workspace.classList.remove("split");
        previewFrame.innerHTML = "";
      }

      previewClose.addEventListener("click", closePreview);

      // Drag-to-resize for the divider. Pointer events with capture survive
      // fast cursor movement, and the .dragging class disables pointer
      // events on the rendered page so it can't swallow the mouse stream.
      let dragPointerId = null;
      function onDragMove(event) {
        if (dragPointerId === null) return;
        const rect = workspace.getBoundingClientRect();
        const offset = event.clientX - rect.left;
        const pct = Math.min(85, Math.max(15, (offset / rect.width) * 100));
        previewPane.style.flex = `0 0 ${pct}%`;
      }
      function endDrag() {
        if (dragPointerId === null) return;
        try {
          resizer.releasePointerCapture(dragPointerId);
        } catch (_err) {
          /* pointer may already be released */
        }
        dragPointerId = null;
        resizer.classList.remove("dragging");
        workspace.classList.remove("dragging");
        window.removeEventListener("pointermove", onDragMove);
        window.removeEventListener("pointerup", endDrag);
        window.removeEventListener("pointercancel", endDrag);
      }
      resizer.addEventListener("pointerdown", (event) => {
        if (!workspace.classList.contains("split")) return;
        dragPointerId = event.pointerId;
        resizer.setPointerCapture(dragPointerId);
        resizer.classList.add("dragging");
        workspace.classList.add("dragging");
        window.addEventListener("pointermove", onDragMove);
        window.addEventListener("pointerup", endDrag);
        window.addEventListener("pointercancel", endDrag);
        event.preventDefault();
      });

      function updateHeaderState() {
        const pageScrolled = window.scrollY > 4;
        const chatScrolled = chatLog.scrollTop > 4;

        if (pageScrolled || chatScrolled) {
          chatHeader.classList.add("scrolled");
        } else {
          chatHeader.classList.remove("scrolled");
        }
      }

      chatLog.addEventListener("scroll", updateHeaderState);
      window.addEventListener("scroll", updateHeaderState, { passive: true });
      updateHeaderState();

      function normalizeTitleKey(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/\s+/g, " ")
          .trim();
      }

      function normalizeDocPath(value) {
        if (!value) return "";
        try {
          const parsed = new URL(value, window.location.origin);
          return decodeURIComponent(parsed.pathname)
            .replace(/\/+$/, "")
            .toLowerCase();
        } catch (_err) {
          return decodeURIComponent(String(value).split(/[?#]/)[0])
            .replace(/\/+$/, "")
            .toLowerCase();
        }
      }

      function isPageSource(source) {
        const id = typeof source?.confluenceId === "string" ? source.confluenceId : "";
        return !id.startsWith("att:");
      }

      function addToMapList(map, key, source) {
        if (!key) return;
        const list = map.get(key);
        if (list) list.push(source);
        else map.set(key, [source]);
      }

      function sortByRelevance(sources) {
        return [...sources].sort(
          (a, b) => (Number(b?.relevance) || 0) - (Number(a?.relevance) || 0)
        );
      }

      function buildSourceContext(sources) {
        const pageSources = (Array.isArray(sources) ? sources : []).filter(isPageSource);
        const byPath = new Map();
        const byTitle = new Map();

        for (const source of pageSources) {
          addToMapList(byPath, normalizeDocPath(source?.url || ""), source);
          addToMapList(byTitle, normalizeTitleKey(source?.title || ""), source);
        }

        return {
          pageSources,
          byPath,
          byTitle,
        };
      }

      function dedupeExcerpts(values) {
        const out = [];
        const seen = new Set();
        for (const value of values) {
          if (typeof value !== "string") continue;
          const excerpt = value.trim();
          if (!excerpt) continue;
          if (seen.has(excerpt)) continue;
          seen.add(excerpt);
          out.push(excerpt);
        }
        return out;
      }

      function resolveSourceFromLink(href, title, sourceContext) {
        if (!sourceContext) return null;
        const pathKey = normalizeDocPath(href);
        const titleKey = normalizeTitleKey(title);

        const pathMatches = sourceContext.byPath.get(pathKey) || [];
        if (pathMatches.length > 0) return sortByRelevance(pathMatches)[0];

        const titleMatches = sourceContext.byTitle.get(titleKey) || [];
        if (titleMatches.length > 0) return sortByRelevance(titleMatches)[0];

        if (sourceContext.pageSources.length === 1) return sourceContext.pageSources[0];
        return null;
      }

      function collectContextExcerpts(source, sourceContext) {
        if (!sourceContext) return [];
        const merged = [];

        const pathKey = normalizeDocPath(source?.url || "");
        const titleKey = normalizeTitleKey(source?.title || "");

        if (pathKey) {
          for (const s of sourceContext.byPath.get(pathKey) || []) merged.push(s?.excerpt);
        }
        if (titleKey) {
          for (const s of sourceContext.byTitle.get(titleKey) || []) merged.push(s?.excerpt);
        }
        if (merged.length === 0 && source?.excerpt) merged.push(source.excerpt);
        if (merged.length === 0) {
          for (const s of sortByRelevance(sourceContext.pageSources).slice(0, 3)) {
            merged.push(s?.excerpt);
          }
        }

        return dedupeExcerpts(merged);
      }

      // Catch clicks on inline source links inside answer text. /doc/* and
      // /attachment/* both render in the side pane.
      chatLog.addEventListener("click", (event) => {
        const link = event.target.closest("a.src-link.is-page, a.src-link.is-download");
        if (!link) return;
        event.preventDefault();
        const href = link.getAttribute("href");
        const title = link.textContent || "Sida";

        const bubble = link.closest(".bubble");
        const sourceContext =
          (bubble && bubble._ragSourceContext) ||
          buildSourceContext((bubble && bubble._ragSources) || []);
        const match = resolveSourceFromLink(href, title, sourceContext);
        const excerpts = collectContextExcerpts(match, sourceContext);
        openPreview(href, title, excerpts);
      });

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // Render inline markdown: **bold** and [text](url) links.
      // Input is plain text; output is HTML-safe with the limited markdown
      // expanded into <strong> and <a> elements. Internal links are tagged
      // with helper classes so the click handler can route /doc/* into the
      // preview pane and so /attachment/* render with a download icon.
      function renderInline(text) {
        const linkRegex = /\[([^\]]+)\]\(([^)\s]+)\)/g;
        const parts = [];
        let lastIndex = 0;
        let match;
        while ((match = linkRegex.exec(text)) !== null) {
          if (match.index > lastIndex) {
            parts.push(escapeHtml(text.substring(lastIndex, match.index)));
          }
          const label = escapeHtml(match[1]);
          const rawUrl = match[2];
          const safe = /^(https?:|\/)/i.test(rawUrl);
          const href = safe ? escapeHtml(rawUrl) : "#";
          const isDownload = /^\/attachment\//i.test(rawUrl);
          const isPage = /^\/doc\//i.test(rawUrl);
          const targetAttr = /^https?:/i.test(rawUrl)
            ? ' target="_blank" rel="noopener noreferrer"'
            : "";
          let cls = "";
          if (isDownload) cls = ' class="src-link is-download"';
          else if (isPage) cls = ' class="src-link is-page"';
          parts.push(`<a href="${href}"${cls}${targetAttr}>${label}</a>`);
          lastIndex = linkRegex.lastIndex;
        }
        if (lastIndex < text.length) {
          parts.push(escapeHtml(text.substring(lastIndex)));
        }
        // Bold pass on already-built HTML (escaped text + safe anchors).
        return parts.join("").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      }

      function formatResponseText(text) {
        const lines = String(text || "").split(/\r?\n/);
        const html = [];
        let i = 0;

        const bulletRegex = /^\s*[-*•]\s+(.+)$/;
        const numberRegex = /^\s*\d+[.)]\s+(.+)$/;

        while (i < lines.length) {
          const line = lines[i].trim();
          if (!line) {
            i++;
            continue;
          }

          if (bulletRegex.test(line)) {
            const items = [];
            while (i < lines.length && bulletRegex.test(lines[i].trim())) {
              const match = lines[i].trim().match(bulletRegex);
              items.push(`<li>${renderInline(match[1])}</li>`);
              i++;
            }
            html.push(`<ul>${items.join("")}</ul>`);
            continue;
          }

          if (numberRegex.test(line)) {
            const items = [];
            while (i < lines.length && numberRegex.test(lines[i].trim())) {
              const match = lines[i].trim().match(numberRegex);
              items.push(`<li>${renderInline(match[1])}</li>`);
              i++;
            }
            html.push(`<ol>${items.join("")}</ol>`);
            continue;
          }

          html.push(`<p>${renderInline(line)}</p>`);
          i++;
        }

        return html.join("") || `<p>${renderInline(String(text || ""))}</p>`;
      }

      function appendBubble(text, role = "bot", extras = null) {
        const item = document.createElement("article");
        item.className = `bubble ${role}`;
        if (role === "bot") {
          item.innerHTML = formatResponseText(text);
        } else {
          item.textContent = text;
        }

        if (extras && role === "bot") {
          // Stash the source list on the bubble so inline-link clicks can
          // look up the matching excerpt and highlight it in the page.
          if (Array.isArray(extras.sources) && extras.sources.length > 0) {
            item._ragSources = extras.sources;
            item._ragSourceContext = buildSourceContext(extras.sources);
          }
        }

        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function addTyping() {
        const typing = document.createElement("article");
        typing.className = "bubble bot";
        typing.id = "typing";
        typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        chatLog.appendChild(typing);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function removeTyping() {
        const typing = document.getElementById("typing");
        if (typing) {
          typing.remove();
        }
      }

      // Conversation history sent with each request so follow-ups have context.
      const conversation = [];
      const MAX_HISTORY = 6; // last 3 user/assistant pairs

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = questionInput.value.trim();
        if (!question) return;

        appendBubble(question, "user");
        questionInput.value = "";
        questionInput.focus();
        sendBtn.disabled = true;
        addTyping();

        try {
          const response = await fetch("/api/qa/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, history: conversation.slice(-MAX_HISTORY) }),
          });

          const payload = await response.json();
          removeTyping();

          if (!response.ok || !payload.success) {
            appendBubble(payload.error || "Request failed. Try again.", "bot");
          } else {
            const data = payload.data || {};
            const answer = data.answer || "No answer returned.";
            const responseSources = Array.isArray(data.sources) ? data.sources : [];
            appendBubble(answer, "bot", {
              confidence: typeof data.confidence === "number" ? data.confidence : null,
              sourcesCount: responseSources.length,
              sources: responseSources,
            });

            // Only feed grounded turns into the next request's context.
            // If the backend returned no sources, the model said "I don't
            // know" — keeping that in history would only confuse follow-ups.
            const grounded = responseSources.length > 0;
            if (grounded) {
              conversation.push({ role: "user", content: question });
              conversation.push({ role: "assistant", content: answer });
            }
          }
        } catch (_error) {
          removeTyping();
          appendBubble("Could not reach the backend. Confirm that the server is running on port 3000.", "bot");
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
