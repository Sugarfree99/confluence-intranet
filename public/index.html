<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confluence Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #10192a;
        --paper: #f6f8fb;
        --panel: #ffffff;
        --line: #d7deea;
        --accent: #1570ef;
        --accent-soft: #e8f1ff;
        --glow: #ffd16f;
        --bot: #f2f6ff;
        --user: #102748;
        --user-text: #f7fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }

      .chat-header {
        position: sticky;
        top: 0;
        z-index: 10;
        width: 100%;
        padding: 10px 0;
        border-bottom: 1px solid transparent;
        background: transparent;
        transition: background 200ms ease, border-color 200ms ease;
      }

      .chat-header.scrolled {
        border-bottom-color: rgba(0, 0, 0, 0.08);
        background: #b8e6c1;
      }

      .wrapper {
        max-width: 1300px;
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0 auto;
        padding: 0 2%;
      }

      .header-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .chat-header .logo {
        height: 56px;
        width: auto;
        flex-shrink: 0;
      }

      .menu-btn {
        border: 0;
        background: transparent;
        color: #1d6e4e;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 46px;
        border-radius: 10px;
        cursor: pointer;
      }

      .menu-btn:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .chat-header.scrolled .menu-btn {
        color: #1d6e4e;
      }

      .menu-icon {
        display: inline-flex;
        flex-direction: column;
        gap: 5px;
      }

      .menu-icon span {
        display: block;
        width: 20px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      .chat-shell {
        width: min(980px, 100%);
        height: min(780px, calc(100vh - 110px));
        margin-top: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        box-shadow:
          0 1px 0 #ffffff,
          0 14px 36px rgba(25, 45, 75, 0.12);
      }

      .content-block {
        width: 100%;
        max-width: 1300px;
        padding: 50px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .site-footer {
        width: 100%;
        display: flex;
        justify-content: center;
        background: #404040;
        padding: 20px;
      }

      .footer-inner {
        width: 100%;
        max-width: 1300px;
        display: flex;
        justify-content: center;
      }

      .footer-block {
        padding: 50px 0;
      }

      .footer-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .footer-logo-wrap {
        height: 72px;
        display: flex;
        align-items: center;
      }

      .site-footer .footer-logo {
        height: 100%;
        width: auto;
        margin-bottom: 15px;
      }

      .site-footer .footer-text {
        margin: 0;
        font-size: 15px;
        color: #ffffff;
      }

      .logout-form {
        margin-top: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .logout-form p {
        margin: 0;
        color: #ffffff;
      }

      .logout-form .logout-btn {
        border: 0;
        background: #ffffff;
        color: #1f1f1f;
        padding: 10px 20px;
        border-radius: 2px;
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
      }

      .chat-log {
        padding: 20px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bubble {
        max-width: 82%;
        border-radius: 16px;
        padding: 12px 14px;
        line-height: 1.45;
        animation: reveal 220ms ease-out;
      }

      .bubble.user {
        margin-left: auto;
        background: var(--user);
        color: var(--user-text);
        border-bottom-right-radius: 6px;
      }

      .bubble.bot {
        background: var(--bot);
        border: 1px solid #d8e3ff;
        border-bottom-left-radius: 6px;
      }

      .meta {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        background: var(--accent-soft);
        color: #0f3f86;
        font-size: 12px;
        border: 1px solid #c8dbff;
        border-radius: 999px;
        padding: 4px 10px;
        font-family: inherit;
      }

      .sources {
        margin-top: 10px;
        border-top: 1px dashed #cbd9f4;
        padding-top: 10px;
      }

      .source-item {
        background: #ffffff;
        border: 1px solid #d5e0f8;
        border-radius: 10px;
        padding: 8px;
        margin-top: 8px;
      }

      .source-title {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 4px;
      }

      .source-excerpt {
        margin: 0;
        font-size: 13px;
        color: #36445f;
      }

      .composer {
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      .composer-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .composer-input {
        width: 100%;
        border: 1px solid #c8d4ea;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 15px;
        font-family: inherit;
        background: #fbfdff;
      }

      .composer-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.17);
      }

      .send-btn {
        border: 0;
        border-radius: 14px;
        padding: 0 22px;
        font-family: inherit;
        font-size: 13px;
        color: #ffffff;
        cursor: pointer;
        background: #26b275;
      }

      .send-btn:hover:not([disabled]) {
        background: #21a06a;
      }

      .send-btn[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        margin: 9px 2px 0;
        font-size: 12px;
        color: #62738f;
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5877ae;
        animation: pulse 1s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 120ms;
      }

      .typing span:nth-child(3) {
        animation-delay: 240ms;
      }

      @keyframes reveal {
        from {
          transform: translateY(6px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.7);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 0;
        }

        .chat-shell {
          height: calc(100vh - 96px);
          border-radius: 18px;
        }

        .content-block {
          padding: 50px 10px;
        }

        .chat-header {
          padding: 8px 0;
        }

        .chat-header .logo {
          height: 44px;
        }

        .menu-btn {
          width: 40px;
          height: 40px;
        }

        .site-footer .footer-logo {
          height: 100%;
        }

        .site-footer .footer-text {
          font-size: 14px;
        }

        .footer-logo-wrap {
          height: 58px;
        }

        .bubble {
          max-width: 94%;
        }
      }
    </style>
  </head>
  <body>
    <header class="chat-header" id="chatHeader">
      <div class="wrapper header-wrapper">
        <img class="logo" src="/Nordrest.png" alt="Nordrest" />
        <button class="menu-btn" type="button" aria-label="Open menu">
          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
    </header>

    <div class="content-block">
      <main class="chat-shell">
        <section id="chatLog" class="chat-log" aria-live="polite">
          <article class="bubble bot">
            Ask anything about your synced Confluence content. I will answer and list supporting sources.
          </article>
        </section>

        <footer class="composer">
          <form id="chatForm" class="composer-form">
            <input
              id="questionInput"
              class="composer-input"
              type="text"
              placeholder="Ask a question..."
              autocomplete="off"
              required
            />
            <button id="sendBtn" class="send-btn" type="submit">Skicka</button>
          </form>
        </footer>
      </main>
    </div>

    <footer class="site-footer" aria-label="Site footer">
      <div class="footer-inner">
        <div class="footer-block">
          <div class="footer-content">
            <div class="footer-logo-wrap">
              <img class="footer-logo" src="/Nordrest.png" alt="Nordrest" />
            </div>
            <p class="footer-text">Copyright © Nordrest 2026</p>
            <div class="logout-form">
              <p>Du är inloggad som Nordrestanställd</p>
              <form action="/sv/" enctype="multipart/form-data" method="post">
                <button class="logout-btn" type="submit">Logga ut</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      const chatLog = document.getElementById("chatLog");
      const chatForm = document.getElementById("chatForm");
      const questionInput = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatHeader = document.getElementById("chatHeader");

      function updateHeaderState() {
        const pageScrolled = window.scrollY > 4;
        const chatScrolled = chatLog.scrollTop > 4;

        if (pageScrolled || chatScrolled) {
          chatHeader.classList.add("scrolled");
        } else {
          chatHeader.classList.remove("scrolled");
        }
      }

      chatLog.addEventListener("scroll", updateHeaderState);
      window.addEventListener("scroll", updateHeaderState, { passive: true });
      updateHeaderState();

      function appendBubble(text, role = "bot", extras = null) {
        const item = document.createElement("article");
        item.className = `bubble ${role}`;
        item.textContent = text;

        if (extras && role === "bot") {
          const meta = document.createElement("div");
          meta.className = "meta";

          if (typeof extras.confidence === "number") {
            const confidenceChip = document.createElement("span");
            confidenceChip.className = "chip";
            confidenceChip.textContent = `confidence: ${(extras.confidence * 100).toFixed(0)}%`;
            meta.appendChild(confidenceChip);
          }

          if (extras.sourcesCount > 0) {
            const sourceChip = document.createElement("span");
            sourceChip.className = "chip";
            sourceChip.textContent = `sources: ${extras.sourcesCount}`;
            meta.appendChild(sourceChip);
          }

          item.appendChild(meta);

          if (Array.isArray(extras.sources) && extras.sources.length > 0) {
            const sources = document.createElement("section");
            sources.className = "sources";

            extras.sources.slice(0, 3).forEach((s) => {
              const sourceItem = document.createElement("div");
              sourceItem.className = "source-item";

              const title = document.createElement("p");
              title.className = "source-title";
              title.textContent = s.title || "Untitled source";

              const excerpt = document.createElement("p");
              excerpt.className = "source-excerpt";
              excerpt.textContent = s.excerpt || "No excerpt";

              sourceItem.appendChild(title);
              sourceItem.appendChild(excerpt);
              sources.appendChild(sourceItem);
            });

            item.appendChild(sources);
          }
        }

        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function addTyping() {
        const typing = document.createElement("article");
        typing.className = "bubble bot";
        typing.id = "typing";
        typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        chatLog.appendChild(typing);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function removeTyping() {
        const typing = document.getElementById("typing");
        if (typing) {
          typing.remove();
        }
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = questionInput.value.trim();
        if (!question) return;

        appendBubble(question, "user");
        questionInput.value = "";
        questionInput.focus();
        sendBtn.disabled = true;
        addTyping();

        try {
          const response = await fetch("/api/qa/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });

          const payload = await response.json();
          removeTyping();

          if (!response.ok || !payload.success) {
            appendBubble(payload.error || "Request failed. Try again.", "bot");
          } else {
            const data = payload.data || {};
            appendBubble(data.answer || "No answer returned.", "bot");
          }
        } catch (_error) {
          removeTyping();
          appendBubble("Could not reach the backend. Confirm that the server is running on port 3000.", "bot");
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
