<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confluence Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #10192a;
        --paper: #f6f8fb;
        --panel: #ffffff;
        --line: #d7deea;
        --accent: #1570ef;
        --accent-soft: #e8f1ff;
        --glow: #ffd16f;
        --bot: #f2f6ff;
        --user: #102748;
        --user-text: #f7fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }

      .chat-header {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 30;
        width: 100%;
        padding: 10px 0;
        border-bottom: 1px solid transparent;
        background: transparent;
        transition: background 200ms ease, border-color 200ms ease;
      }

      .chat-header.scrolled {
        border-bottom-color: rgba(0, 0, 0, 0.08);
        background: #b8e6c1;
      }

      .wrapper {
        max-width: 1300px;
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0 auto;
        padding: 0 2%;
      }

      .header-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .chat-header .logo {
        height: 56px;
        width: auto;
        flex-shrink: 0;
      }

      .page-content {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .page-content .hero-unit {
        background-color: #eee;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .page-content .hero-unit.home-hero {
        width: 100%;
        height: 500px;
        background: #111;
        background-image: url("/background.jpg");
      }

      .menu-btn {
        border: 0;
        background: transparent;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0 6px;
        height: 46px;
        border-radius: 10px;
        cursor: pointer;
        font-family: inherit;
        font-size: 18px;
        line-height: 1;
      }

      .menu-btn:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .chat-header.scrolled .menu-btn {
        color: #ffffff;
      }

      .menu-icon {
        display: inline-flex;
        flex-direction: column;
        gap: 5px;
      }

      .menu-icon span {
        display: block;
        width: 20px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      .menu-label {
        font-size: 0.95em;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .chat-shell {
        width: min(980px, 100%);
        height: min(780px, calc(100vh - 110px));
        margin-top: 0;
        margin-left: auto;
        margin-right: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        box-shadow:
          0 1px 0 #ffffff,
          0 14px 36px rgba(25, 45, 75, 0.12);
      }

      .content-block {
        width: 100%;
        max-width: 1300px;
        padding: 50px 20px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .site-footer {
        width: 100%;
        display: flex;
        justify-content: center;
        background: #404040;
        padding: 20px;
      }

      .footer-inner {
        width: 100%;
        max-width: 1300px;
        display: flex;
        justify-content: center;
      }

      .footer-block {
        padding: 50px 0;
      }

      .footer-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .footer-logo-wrap {
        height: 72px;
        display: flex;
        align-items: center;
      }

      .site-footer .footer-logo {
        height: 100%;
        width: auto;
        margin-bottom: 15px;
      }

      .site-footer .footer-text {
        margin: 0;
        font-size: 15px;
        color: #ffffff;
      }

      .logout-form {
        margin-top: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .logout-form p {
        margin: 0;
        color: #ffffff;
      }

      .logout-form .logout-btn {
        border: 0;
        background: #ffffff;
        color: #1f1f1f;
        padding: 10px 20px;
        border-radius: 2px;
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
      }

      .chat-log {
        padding: 20px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bubble {
        max-width: 82%;
        border-radius: 16px;
        padding: 12px 14px;
        line-height: 1.45;
        animation: reveal 220ms ease-out;
      }

      .bubble.user {
        margin-left: auto;
        background: var(--user);
        color: var(--user-text);
        border-bottom-right-radius: 6px;
      }

      .bubble.bot {
        background: var(--bot);
        border: 1px solid #d8e3ff;
        border-bottom-left-radius: 6px;
      }

      .bubble.bot p {
        margin: 0 0 10px;
      }

      .bubble.bot p:last-child {
        margin-bottom: 0;
      }

      .bubble.bot ul,
      .bubble.bot ol {
        margin: 0 0 10px;
        padding-left: 22px;
      }

      .bubble.bot li {
        margin: 4px 0;
      }

      .meta {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        background: var(--accent-soft);
        color: #0f3f86;
        font-size: 12px;
        border: 1px solid #c8dbff;
        border-radius: 999px;
        padding: 4px 10px;
        font-family: inherit;
      }

      .sources {
        margin-top: 10px;
        border-top: 1px dashed #cbd9f4;
        padding-top: 10px;
      }

      .source-item {
        background: #ffffff;
        border: 1px solid #d5e0f8;
        border-radius: 10px;
        padding: 8px;
        margin-top: 8px;
      }

      .source-title {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 4px;
      }

      .source-excerpt {
        margin: 0;
        font-size: 13px;
        color: #36445f;
      }

      .composer {
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      .composer-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .composer-input {
        width: 100%;
        border: 1px solid #c8d4ea;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 15px;
        font-family: inherit;
        background: #fbfdff;
      }

      .composer-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.17);
      }

      .send-btn {
        border: 0;
        border-radius: 14px;
        padding: 0 22px;
        font-family: inherit;
        font-size: 13px;
        color: #ffffff;
        cursor: pointer;
        background: #26b275;
      }

      .send-btn:hover:not([disabled]) {
        background: #21a06a;
      }

      .send-btn[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        margin: 9px 2px 0;
        font-size: 12px;
        color: #62738f;
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5877ae;
        animation: pulse 1s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 120ms;
      }

      .typing span:nth-child(3) {
        animation-delay: 240ms;
      }

      @keyframes reveal {
        from {
          transform: translateY(6px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.7);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 0;
        }

        .chat-shell {
          height: calc(100vh - 96px);
          border-radius: 18px;
        }

        .content-block {
          padding: 50px 10px;
        }

        .chat-header {
          padding: 8px 0;
        }

        .page-content .hero-unit.home-hero {
          height: 260px;
        }

        .chat-header .logo {
          height: 44px;
        }

        .menu-btn {
          gap: 10px;
          padding: 0 4px;
          height: 40px;
          font-size: 16px;
        }

        .site-footer .footer-logo {
          height: 100%;
        }

        .site-footer .footer-text {
          font-size: 14px;
        }

        .footer-logo-wrap {
          height: 58px;
        }

        .bubble {
          max-width: 94%;
        }
      }

      @media only screen and (min-width: 961px) and (max-width: 1439px) {
        .page-content .hero-unit.home-hero {
          height: 400px;
        }
      }
    </style>
  </head>
  <body>
    <header class="chat-header" id="chatHeader">
      <div class="wrapper header-wrapper">
        <img class="logo" src="/Nordrest.png" alt="Nordrest" />
        <button class="menu-btn" type="button" aria-label="Open menu">
          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="menu-label">MENY</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <section class="hero-unit home-hero" aria-hidden="true"></section>

      <div class="content-block">
        <main class="chat-shell">
          <section id="chatLog" class="chat-log" aria-live="polite">
            <article class="bubble bot">
              Ställ en fråga om företagets interna dokument. Jag söker igenom relevanta medarbetardokument med RAG och ger dig ett kort, tydligt svar.
            </article>
          </section>

          <footer class="composer">
            <form id="chatForm" class="composer-form">
              <input
                id="questionInput"
                class="composer-input"
                type="text"
                placeholder="Ställ en fråga om företagets dokument..."
                autocomplete="off"
                required
              />
              <button id="sendBtn" class="send-btn" type="submit">Skicka</button>
            </form>
          </footer>
        </main>
      </div>
    </div>

    <footer class="site-footer" aria-label="Site footer">
      <div class="footer-inner">
        <div class="footer-block">
          <div class="footer-content">
            <div class="footer-logo-wrap">
              <img class="footer-logo" src="/Nordrest.png" alt="Nordrest" />
            </div>
            <p class="footer-text">Copyright © Nordrest 2026</p>
            <div class="logout-form">
              <p>Du är inloggad som Nordrestanställd</p>
              <form action="/sv/" enctype="multipart/form-data" method="post">
                <button class="logout-btn" type="submit">Logga ut</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      const chatLog = document.getElementById("chatLog");
      const chatForm = document.getElementById("chatForm");
      const questionInput = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatHeader = document.getElementById("chatHeader");

      function updateHeaderState() {
        const pageScrolled = window.scrollY > 4;
        const chatScrolled = chatLog.scrollTop > 4;

        if (pageScrolled || chatScrolled) {
          chatHeader.classList.add("scrolled");
        } else {
          chatHeader.classList.remove("scrolled");
        }
      }

      chatLog.addEventListener("scroll", updateHeaderState);
      window.addEventListener("scroll", updateHeaderState, { passive: true });
      updateHeaderState();

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // Render inline markdown: **bold** and [text](url) links.
      // Input is plain text; output is HTML-safe with the limited markdown
      // expanded into <strong> and <a> elements.
      function renderInline(text) {
        const linkRegex = /\[([^\]]+)\]\(([^)\s]+)\)/g;
        const parts = [];
        let lastIndex = 0;
        let match;
        while ((match = linkRegex.exec(text)) !== null) {
          if (match.index > lastIndex) {
            parts.push(escapeHtml(text.substring(lastIndex, match.index)));
          }
          const label = escapeHtml(match[1]);
          const rawUrl = match[2];
          const safe = /^(https?:|\/)/i.test(rawUrl);
          const href = safe ? escapeHtml(rawUrl) : "#";
          const targetAttr = /^https?:/i.test(rawUrl)
            ? ' target="_blank" rel="noopener noreferrer"'
            : "";
          parts.push(`<a href="${href}"${targetAttr}>${label}</a>`);
          lastIndex = linkRegex.lastIndex;
        }
        if (lastIndex < text.length) {
          parts.push(escapeHtml(text.substring(lastIndex)));
        }
        // Bold pass on already-built HTML (escaped text + safe anchors).
        return parts.join("").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      }

      function formatResponseText(text) {
        const lines = String(text || "").split(/\r?\n/);
        const html = [];
        let i = 0;

        const bulletRegex = /^\s*[-*•]\s+(.+)$/;
        const numberRegex = /^\s*\d+[.)]\s+(.+)$/;

        while (i < lines.length) {
          const line = lines[i].trim();
          if (!line) {
            i++;
            continue;
          }

          if (bulletRegex.test(line)) {
            const items = [];
            while (i < lines.length && bulletRegex.test(lines[i].trim())) {
              const match = lines[i].trim().match(bulletRegex);
              items.push(`<li>${renderInline(match[1])}</li>`);
              i++;
            }
            html.push(`<ul>${items.join("")}</ul>`);
            continue;
          }

          if (numberRegex.test(line)) {
            const items = [];
            while (i < lines.length && numberRegex.test(lines[i].trim())) {
              const match = lines[i].trim().match(numberRegex);
              items.push(`<li>${renderInline(match[1])}</li>`);
              i++;
            }
            html.push(`<ol>${items.join("")}</ol>`);
            continue;
          }

          html.push(`<p>${renderInline(line)}</p>`);
          i++;
        }

        return html.join("") || `<p>${renderInline(String(text || ""))}</p>`;
      }

      function appendBubble(text, role = "bot", extras = null) {
        const item = document.createElement("article");
        item.className = `bubble ${role}`;
        if (role === "bot") {
          item.innerHTML = formatResponseText(text);
        } else {
          item.textContent = text;
        }

        if (extras && role === "bot") {
          const meta = document.createElement("div");
          meta.className = "meta";

          if (typeof extras.confidence === "number") {
            const confidenceChip = document.createElement("span");
            confidenceChip.className = "chip";
            confidenceChip.textContent = `confidence: ${(extras.confidence * 100).toFixed(0)}%`;
            meta.appendChild(confidenceChip);
          }

          if (extras.sourcesCount > 0) {
            const sourceChip = document.createElement("span");
            sourceChip.className = "chip";
            sourceChip.textContent = `sources: ${extras.sourcesCount}`;
            meta.appendChild(sourceChip);
          }

          item.appendChild(meta);

          if (Array.isArray(extras.sources) && extras.sources.length > 0) {
            const sources = document.createElement("section");
            sources.className = "sources";

            extras.sources.slice(0, 3).forEach((s) => {
              const sourceItem = document.createElement("div");
              sourceItem.className = "source-item";

              const title = document.createElement("p");
              title.className = "source-title";
              title.textContent = s.title || "Untitled source";

              const excerpt = document.createElement("p");
              excerpt.className = "source-excerpt";
              excerpt.textContent = s.excerpt || "No excerpt";

              sourceItem.appendChild(title);
              sourceItem.appendChild(excerpt);
              sources.appendChild(sourceItem);
            });

            item.appendChild(sources);
          }
        }

        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function addTyping() {
        const typing = document.createElement("article");
        typing.className = "bubble bot";
        typing.id = "typing";
        typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        chatLog.appendChild(typing);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function removeTyping() {
        const typing = document.getElementById("typing");
        if (typing) {
          typing.remove();
        }
      }

      // Conversation history sent with each request so follow-ups have context.
      const conversation = [];
      const MAX_HISTORY = 6; // last 3 user/assistant pairs

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = questionInput.value.trim();
        if (!question) return;

        appendBubble(question, "user");
        questionInput.value = "";
        questionInput.focus();
        sendBtn.disabled = true;
        addTyping();

        try {
          const response = await fetch("/api/qa/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, history: conversation.slice(-MAX_HISTORY) }),
          });

          const payload = await response.json();
          removeTyping();

          if (!response.ok || !payload.success) {
            appendBubble(payload.error || "Request failed. Try again.", "bot");
          } else {
            const data = payload.data || {};
            const answer = data.answer || "No answer returned.";
            appendBubble(answer, "bot");
            conversation.push({ role: "user", content: question });
            conversation.push({ role: "assistant", content: answer });
          }
        } catch (_error) {
          removeTyping();
          appendBubble("Could not reach the backend. Confirm that the server is running on port 3000.", "bot");
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
